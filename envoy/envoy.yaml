static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains:
              - "*"
              routes:
              - match:
                  prefix: "/api/upload"
                route:
                  cluster: policy_service
                  timeout: 30s
              - match:
                  prefix: "/api/infer"
                route:
                  cluster: gpu_service
                  timeout: 30s
              - match:
                  prefix: "/health"
                route:
                  cluster: policy_service
                  timeout: 5s
              - match:
                  prefix: "/metrics"
                route:
                  cluster: policy_service
                  timeout: 5s
          http_filters:
          - name: envoy.filters.http.ext_authz
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
              grpc_service:
                envoy_grpc:
                  cluster_name: ext_authz_service
                timeout: 5s
              failure_mode_allow: false
              include_peer_certificate: false
              with_request_body:
                max_request_bytes: 10485760  # 10MB
              transport_api_version: V3
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: ext_authz_service
    connect_timeout: 5s
    type: STRICT_DNS
    http2_protocol_options: {}
    load_assignment:
      cluster_name: ext_authz_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: policy-service
                port_value: 5002

  - name: policy_service
    connect_timeout: 5s
    type: STRICT_DNS
    load_assignment:
      cluster_name: policy_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: policy-service
                port_value: 5002

  - name: gpu_service
    connect_timeout: 5s
    type: STRICT_DNS
    load_assignment:
      cluster_name: gpu_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mock-gpu-service
                port_value: 5001

  - name: scanner_service
    connect_timeout: 5s
    type: STRICT_DNS
    load_assignment:
      cluster_name: scanner_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: scanner-service
                port_value: 5003

admin:
  access_log_path: /dev/null
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

layered_runtime:
  layers:
  - name: base
    static_layer:
      envoy:
        resource_limits:
          listener:
            example_listener_name:
              connection_limit: 10000
