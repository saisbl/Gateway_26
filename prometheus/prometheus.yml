global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
  
  - job_name: 'envoy'
    static_configs:
      - targets: ['envoy:9901']
  
  - job_name: 'policy-service'
    static_configs:
      - targets: ['policy-service:5002']
  
  - job_name: 'scanner-service'
    static_configs:
      - targets: ['scanner-service:5003']
  
  - job_name: 'mock-gpu-service'
    static_configs:
      - targets: ['mock-gpu-service:5001']
